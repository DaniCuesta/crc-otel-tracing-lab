apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: otel-lab
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: otel-tracing-lab

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: otel-tracing-lab

    spec:
      imagePullSecrets:
        - name: quay-pull-secret

      containers:
        - name: backend
          image: quay.io/danielcuestam/otel-lab:backendv1
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          envFrom:
            - secretRef:
                name: postgres-secret

          env:
            - name: POSTGRESQL_HOST
              value: "postgres"

            - name: POSTGRESQL_PORT
              value: "5432"

            - name: OTEL_SERVICE_NAME
              value: "backend"

            - name: OTEL_SERVICE_NAMESPACE
              value: "otel-lab"

            - name: OTEL_DEPLOYMENT_ENVIRONMENT
              value: "crc"

            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"

            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"

            - name: OTEL_TRACES_EXPORTER
              value: "otlp"

            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"

            - name: SIMULATED_LATENCY_SECONDS
              value: "4"

          resources:
            requests:
              cpu: 50m
              memory: 128Mi

            limits:
              cpu: 250m
              memory: 320Mi

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault